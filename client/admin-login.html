<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Sari-Sari Store</title>
    <meta name="description" content="Owner/Admin login portal for the Sari-Sari Store management system.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>
    <div class="theme-toggle-floating">
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
            <svg class="sun-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>
    <div class="card-wrapper">
        <div class="store-logo">

            <h1>Owner Portal</h1>
            <p>Tindahan ng mga Alaala Sari-sari Store</p>
        </div>

        <div class="panel active" id="adminLoginPanel">
            <div class="admin-badge">Admin Access</div>
            <div class="form-group">
                <label for="adminLoginUser">Username</label>
                <input type="text" id="adminLoginUser" placeholder="Admin username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="adminLoginPass">Password</label>
                <input type="password" id="adminLoginPass" placeholder="Admin password" autocomplete="current-password">
                <div class="show-pass-row">
                    <input type="checkbox" id="showAdminPass">
                    <label for="showAdminPass">Show password</label>
                </div>
            </div>
            <div class="alert-box" id="adminLoginAlert"></div>
            <div class="btn-group">
                <button class="btn-primary" id="adminLoginBtn">Sign In as Admin</button>
                <button class="btn-ghost" onclick="window.location.href='index.html'">Back to Cashier Login</button>
            </div>
            <p style="text-align:center;margin-top:18px;font-size:0.82rem;color:var(--muted);">
                No admin account yet? <button class="link-btn" id="goAdminRegisterBtn">Create Owner Account</button>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
