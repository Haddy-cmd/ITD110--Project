<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sari-Sari Store — Login</title>
    <meta name="description" content="Login or register to the Sari-Sari Store inventory and sales system.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>
    <div class="theme-toggle-floating">
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
            <svg class="sun-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>
    <div class="card-wrapper">
        <div class="store-logo">
            <h1>Tindahan ng mga Alaala</h1>

        </div>

        <!-- Tab Bar -->
        <div class="tab-bar" role="tablist">
            <button class="tab-btn active" id="tabLogin" role="tab" aria-selected="true">Login</button>
            <button class="tab-btn" id="tabRegister" role="tab" aria-selected="false">Register</button>
        </div>

        <!-- ── LOGIN PANEL ── -->
        <div class="panel active" id="loginPanel">
            <div class="form-group">
                <label for="loginUser">Username</label>
                <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPass">Password</label>
                <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password">
                <div class="show-pass-row">
                    <input type="checkbox" id="showLoginPass">
                    <label for="showLoginPass">Show password</label>
                </div>
            </div>
            <div class="alert-box" id="loginAlert"></div>
            <div class="btn-group">
                <button class="btn-primary" id="loginBtn">Sign In</button>
            </div>
            <p style="text-align:center;margin-top:18px;font-size:0.82rem;color:var(--muted);">
                Are you the store owner? <button class="link-btn"
                    onclick="window.location.href='admin-login.html'">Admin Login</button>
            </p>
        </div>

        <!-- ── REGISTER PANEL ── -->
        <div class="panel" id="registerPanel">
            <div class="form-row">
                <div class="form-group">
                    <label for="regFirst">First Name *</label>
                    <input type="text" id="regFirst" placeholder="First name">
                </div>
                <div class="form-group">
                    <label for="regMiddle">Middle Name</label>
                    <input type="text" id="regMiddle" placeholder="Middle name">
                </div>
            </div>
            <div class="form-group">
                <label for="regLast">Last Name *</label>
                <input type="text" id="regLast" placeholder="Last name">
            </div>
            <div class="form-group">
                <label for="regAddress">Address *</label>
                <input type="text" id="regAddress" placeholder="Full address">
            </div>
            <div class="form-group">
                <label for="regEmail">Email Address *</label>
                <input type="email" id="regEmail" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label for="regUser">Username *</label>
                <input type="text" id="regUser" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="regPass">Password *</label>
                <input type="password" id="regPass" placeholder="Create a password">
                <div class="strength-bar-wrap">
                    <div class="strength-bar" id="regStrengthBar"></div>
                </div>
                <p class="password-hint">Min 8 chars, uppercase, lowercase, special char</p>
            </div>
            <div class="form-group">
                <label for="regPassConfirm">Confirm Password *</label>
                <input type="password" id="regPassConfirm" placeholder="Retype password">
            </div>
            <div class="alert-box" id="registerAlert"></div>
            <div class="btn-group">
                <button class="btn-primary" id="registerBtn">Create Account</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
