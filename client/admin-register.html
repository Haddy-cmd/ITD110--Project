<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Owner Account — Sari-Sari Store</title>
    <meta name="description" content="One-time admin/owner account registration for the Sari-Sari Store system.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="theme-toggle-floating">
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
            <svg class="sun-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>
<div class="card-wrapper">
    <div class="store-logo">
        <span class="logo-icon"></span>
        <h1>Create Owner Account</h1>
        <p>This can only be done once</p>
    </div>

    <!-- Locked state (shown if admin already exists) -->
    <div class="panel" id="lockedPanel">
        <div class="alert-box error" style="display:block;">
            An admin account already exists. This registration page is locked.
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="window.location.href='admin-login.html'">Go to Admin Login</button>
        </div>
    </div>

    <!-- Registration form -->
    <div class="panel active" id="adminRegPanel">
        <div class="admin-badge">One-Time Setup</div>
        <div class="form-row">
            <div class="form-group">
                <label for="aRegFirst">First Name *</label>
                <input type="text" id="aRegFirst" placeholder="First name">
            </div>
            <div class="form-group">
                <label for="aRegMiddle">Middle Name</label>
                <input type="text" id="aRegMiddle" placeholder="Middle name">
            </div>
        </div>
        <div class="form-group">
            <label for="aRegLast">Last Name *</label>
            <input type="text" id="aRegLast" placeholder="Last name">
        </div>
        <div class="form-group">
            <label for="aRegAddress">Address *</label>
            <input type="text" id="aRegAddress" placeholder="Full address">
        </div>
        <div class="form-group">
            <label for="aRegEmail">Email Address *</label>
            <input type="email" id="aRegEmail" placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label for="aRegUser">Username *</label>
            <input type="text" id="aRegUser" placeholder="Choose admin username">
        </div>
        <div class="form-group">
            <label for="aRegPass">Password *</label>
            <input type="password" id="aRegPass" placeholder="Create a strong password">
            <div class="strength-bar-wrap"><div class="strength-bar" id="aRegStrengthBar"></div></div>
            <p class="password-hint">Min 8 chars, uppercase, lowercase, special char</p>
        </div>
        <div class="form-group">
            <label for="aRegPassConfirm">Confirm Password *</label>
            <input type="password" id="aRegPassConfirm" placeholder="Retype password">
        </div>
        <div class="alert-box" id="adminRegAlert"></div>
        <div class="btn-group">
            <button class="btn-primary" id="adminRegBtn">Create Owner Account</button>
            <button class="btn-ghost" onclick="window.location.href='admin-login.html'">Back</button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
