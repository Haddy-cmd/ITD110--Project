<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITE193</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="MP4.css" rel="stylesheet">
</head>
<body>

<div class="card-wrapper">

    <!-- ── LOGIN PANEL ── -->
    <div class="panel active" id="loginPanel">
        <h1>ITE193</h1>
        <p class="subtitle">Machine Problem 4</p>
        <hr>

        <div class="form-group">
            <label for="loginUser">Username</label>
            <input type="text" id="loginUser" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label for="loginPass">Password</label>
            <input type="password" id="loginPass" placeholder="Enter password">
            <div class="show-pass-row">
                <input type="checkbox" id="showLoginPass">
                <label for="showLoginPass">Show password</label>
            </div>
        </div>

        <div class="alert-box" id="loginAlert"></div>

        <div class="btn-group">
            <button class="btn-primary" id="loginBtn">Login</button>
            <button class="btn-ghost" id="goRegisterBtn">Create New Account</button>
            <button class="btn-ghost" id="exitBtn">Exit</button>
        </div>
    </div>

    <!-- ── REGISTER PANEL ── -->
    <div class="panel" id="registerPanel">
        <h1>REGISTER</h1>
        <p class="subtitle">Create a new account</p>
        <hr>

        <div class="form-row">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" id="regFirst" placeholder="First name">
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" id="regMiddle" placeholder="Middle name">
            </div>
        </div>

        <div class="form-group">
            <label>Last Name *</label>
            <input type="text" id="regLast" placeholder="Last name">
        </div>

        <div class="form-group">
            <label>Address *</label>
            <input type="text" id="regAddress" placeholder="Full address">
        </div>

        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="regEmail" placeholder="email@example.com">
        </div>

        <hr style="margin-top:16px;">

        <div class="form-group">
            <label>Username *</label>
            <input type="text" id="regUser" placeholder="Choose a username">
        </div>

        <div class="form-group">
            <label>Password *</label>
            <input type="password" id="regPass" placeholder="Create a password">
            <div class="strength-bar-wrap"><div class="strength-bar" id="regStrengthBar"></div></div>
            <p class="password-hint">Min 8 chars • uppercase • lowercase • special char</p>
        </div>

        <div class="form-group">
            <label>Confirm Password *</label>
            <input type="password" id="regPassConfirm" placeholder="Retype password">
        </div>

        <div class="alert-box" id="registerAlert"></div>

        <div class="btn-group">
            <button class="btn-primary" id="registerBtn">Create Account</button>
            <button class="btn-ghost" id="backToLoginBtn">← Back to Login</button>
        </div>
    </div>

</div>

<script src="MP4.js"></script>
</body>
</html>
